# application-docker.properties

# Datasource (read from env - safe defaults provided)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/ecommerce_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:******}

# Explicit driver class - prevents DriverManager lookup issues
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari pool / connection tuning
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
# Use a simple validation query so Hikari can validate the connection
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# explicit dialect (safe and supported)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mail (MailHog)
spring.mail.host=${SPRING_MAIL_HOST:mailhog}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.mail.from=${APP_MAIL_FROM:noreply@myshop.example}

# Actuator (if enabled)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
