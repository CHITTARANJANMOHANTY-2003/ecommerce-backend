spring.application.name=ecommerce-backend

# ===============================
# DATABASE CONFIGURATION
# ===============================

# Default for local development
spring.datasource.url=jdbc:mysql://db:3306/ecommerce_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Chitta@18*59
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT CONFIGURATION
# ===============================

app.jwt.secret=EcommerceSpringBootJwtSecretKey12345678901234567890
app.jwt.expiration-ms=86400000

# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=8080

# ===============================
# LOGGING CONFIGURATION
# ===============================

logging.level.root=INFO
logging.level.com.ecommerce=DEBUG

# ===============================
# EMAIL CONFIGURATION (DEFAULT)
# ===============================

spring.mail.host=localhost
spring.mail.port=25
app.mail.from=noreply@myshop.example
